services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:?Set the public HTTPS API URL before deployment}
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      APP_ENVIRONMENT: production
      DEBUG: "false"
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:?Set a unique AUTH_JWT_SECRET of at least 32 characters}
      AUTH_EMAIL_PROVIDER: ${AUTH_EMAIL_PROVIDER:?Set AUTH_EMAIL_PROVIDER to smtp or tencent_ses}
      AUTH_SMTP_HOST: ${AUTH_SMTP_HOST:-}
      AUTH_SMTP_PORT: ${AUTH_SMTP_PORT:-587}
      AUTH_SMTP_USERNAME: ${AUTH_SMTP_USERNAME:-}
      AUTH_SMTP_PASSWORD: ${AUTH_SMTP_PASSWORD:-}
      AUTH_SMTP_FROM_EMAIL: ${AUTH_SMTP_FROM_EMAIL:-}
      AUTH_TENCENT_SES_REGION: ${AUTH_TENCENT_SES_REGION:-ap-guangzhou}
      AUTH_TENCENT_SES_FROM_EMAIL: ${AUTH_TENCENT_SES_FROM_EMAIL:-}
      AUTH_TENCENT_SES_TEMPLATE_ID: ${AUTH_TENCENT_SES_TEMPLATE_ID:-0}
      TENCENTCLOUD_SECRET_ID: ${TENCENTCLOUD_SECRET_ID:-}
      TENCENTCLOUD_SECRET_KEY: ${TENCENTCLOUD_SECRET_KEY:-}
      DATABASE_URL: sqlite:///./data/openclassbook.db
      CORS_ORIGINS: ${CORS_ORIGINS:?Set CORS_ORIGINS to a JSON list of public HTTPS frontend origins}
    volumes:
      - backend-data:/app/data
      - backend-storage:/app/storage
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  backend-data:
  backend-storage:
